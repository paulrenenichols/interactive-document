<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forge Analytics - Zen Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#ffdad3",
                        "on-primary-fixed-variant": "#8e1300",
                        "surface-dim": "#d9dadc",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "primary": "#b32006",
                        "surface-container-high": "#e7e8ea",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f3f4f6",
                        "on-tertiary-fixed": "#0a1c34",
                        "surface-variant": "#e1e2e4",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#fefcff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#bfc6de",
                        "tertiary-fixed": "#d6e3ff",
                        "on-error": "#ffffff",
                        "tertiary": "#4d5c78",
                        "on-surface-variant": "#5b403b",
                        "inverse-on-surface": "#f0f1f3",
                        "surface-container": "#edeef0",
                        "on-tertiary-fixed-variant": "#384762",
                        "inverse-primary": "#ffb4a5",
                        "tertiary-fixed-dim": "#b7c7e7",
                        "primary-container": "#d73b1f",
                        "background": "#f8f9fb",
                        "outline-variant": "#e4beb7",
                        "surface-container-highest": "#e1e2e4",
                        "on-primary-fixed": "#3e0400",
                        "outline": "#8f7069",
                        "surface": "#f8f9fb",
                        "on-secondary-fixed": "#131b2d",
                        "on-secondary-container": "#5b6277",
                        "secondary-fixed": "#dbe2fa",
                        "error": "#ba1a1a",
                        "secondary-container": "#d8dff7",
                        "on-background": "#191c1e",
                        "secondary": "#565e72",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#ffb4a5",
                        "on-surface": "#191c1e",
                        "inverse-surface": "#2e3132",
                        "on-primary-container": "#fffbff",
                        "tertiary-container": "#657592",
                        "surface-bright": "#f8f9fb",
                        "surface-tint": "#b72308",
                        "on-secondary-fixed-variant": "#3f475a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fb;
        }
    </style>
</head>
<body class="overflow-hidden">
<!-- TopNavBar (Shared Component) -->
<nav class="bg-[#0D1526] dark:bg-[#0D1526] docked full-width top-0 h-[48px] flex justify-between items-center w-full px-6 z-50 fixed">
<div class="flex items-center gap-8">
<span class="text-lg font-black text-white tracking-tighter">Forge Analytics</span>
<div class="flex gap-6 items-center">
<a class="font-['Plus_Jakarta_Sans'] text-xs font-semibold uppercase tracking-wider text-slate-400 hover:text-white transition-colors" href="#">Data Model</a>
<a class="font-['Plus_Jakarta_Sans'] text-xs font-semibold uppercase tracking-wider text-[#E8472A] border-b-2 border-[#E8472A] pb-1" href="#">Slide Deck</a>
</div>
</div>
<div class="flex items-center gap-3">
<button class="font-['Plus_Jakarta_Sans'] text-xs font-semibold uppercase tracking-wider text-slate-400 hover:text-white transition-colors px-3 py-1.5 hover:bg-white/5 transition-all active:scale-95 duration-100">Present</button>
<button class="font-['Plus_Jakarta_Sans'] text-xs font-semibold uppercase tracking-wider bg-primary-container text-on-primary-container px-4 py-1.5 rounded-sm hover:bg-primary transition-all active:scale-95 duration-100">Share</button>
</div>
</nav>
<!-- Main Content Stage -->
<main class="pt-[48px] h-screen w-full flex flex-col items-center justify-center bg-surface-container-low relative">
<!-- Object Insertion Controls (New) -->
<div class="absolute top-[80px] left-12 flex items-center gap-4 z-40">
<button class="flex items-center gap-2 px-3 py-1.5 rounded-sm border border-outline/20 bg-surface hover:bg-surface-container transition-all text-secondary group">
<span class="material-symbols-outlined text-sm">text_fields</span>
<span class="font-headline text-[11px] font-bold uppercase tracking-widest">Insert Text Box</span>
</button>
<button class="flex items-center gap-2 px-3 py-1.5 rounded-sm border border-outline/20 bg-surface hover:bg-surface-container transition-all text-secondary group">
<span class="material-symbols-outlined text-sm">pentagon</span>
<span class="font-headline text-[11px] font-bold uppercase tracking-widest">Insert Shape</span>
</button>
<button class="flex items-center gap-2 px-3 py-1.5 rounded-sm border border-outline/20 bg-surface hover:bg-surface-container transition-all text-secondary group">
<span class="material-symbols-outlined text-sm">bar_chart</span>
<span class="font-headline text-[11px] font-bold uppercase tracking-widest">Insert Chart</span>
</button>
</div>
<!-- Slide Canvas -->
<div class="relative w-full max-w-[1280px] aspect-[16/9] bg-surface-container-lowest shadow-2xl rounded-sm overflow-hidden flex flex-col scale-[0.85] origin-center">
<!-- Slide Content Wrapper -->
<div class="p-16 flex flex-col h-full">
<!-- Slide Header -->
<header class="mb-12">
<h1 class="font-headline text-5xl font-extrabold text-on-surface tracking-tight mb-2">Salary Variance Overview</h1>
<div class="h-1 w-24 bg-primary rounded-full"></div>
</header>
<!-- Charts Bento Grid -->
<div class="grid grid-cols-2 gap-10 flex-grow">
<!-- Chart Column 1: Comp Demographics -->
<div class="flex flex-col">
<div class="flex justify-between items-end mb-4">
<h2 class="font-headline text-lg font-bold text-on-surface-variant uppercase tracking-widest">Comp Demographics</h2>
<span class="font-mono text-xs text-secondary">REF_ID: 942-D</span>
</div>
<div class="flex-grow bg-surface-container-low rounded-lg p-8 flex flex-col justify-center">
<div class="space-y-6">
<div class="flex items-center gap-4">
<span class="font-mono text-[10px] w-12 text-slate-500 text-right">ENG</span>
<div class="flex-grow h-8 bg-surface-container-high relative">
<div class="absolute inset-y-0 left-0 bg-primary w-[85%]"></div>
<span class="absolute right-2 inset-y-0 flex items-center font-mono text-[11px] font-bold text-on-surface">85%</span>
</div>
</div>
<div class="flex items-center gap-4">
<span class="font-mono text-[10px] w-12 text-slate-500 text-right">MKT</span>
<div class="flex-grow h-8 bg-surface-container-high relative">
<div class="absolute inset-y-0 left-0 bg-primary w-[62%] opacity-80"></div>
<span class="absolute right-2 inset-y-0 flex items-center font-mono text-[11px] font-bold text-on-surface">62%</span>
</div>
</div>
<div class="flex items-center gap-4">
<span class="font-mono text-[10px] w-12 text-slate-500 text-right">OPS</span>
<div class="flex-grow h-8 bg-surface-container-high relative">
<div class="absolute inset-y-0 left-0 bg-primary w-[44%] opacity-60"></div>
<span class="absolute right-2 inset-y-0 flex items-center font-mono text-[11px] font-bold text-on-surface">44%</span>
</div>
</div>
<div class="flex items-center gap-4">
<span class="font-mono text-[10px] w-12 text-slate-500 text-right">FIN</span>
<div class="flex-grow h-8 bg-surface-container-high relative">
<div class="absolute inset-y-0 left-0 bg-[#0D1526] w-[71%]"></div>
<span class="absolute right-2 inset-y-0 flex items-center font-mono text-[11px] font-bold text-on-surface">71%</span>
</div>
</div>
</div>
</div>
</div>
<!-- Chart Column 2: Salary Variance -->
<div class="flex flex-col">
<div class="flex justify-between items-end mb-4">
<h2 class="font-headline text-lg font-bold text-on-surface-variant uppercase tracking-widest">Salary Variance</h2>
<span class="font-mono text-xs text-secondary">FY24_PROJECTED</span>
</div>
<div class="flex-grow bg-surface-container-low rounded-lg p-8 relative">
<div class="absolute inset-8 flex flex-col justify-between pointer-events-none opacity-20">
<div class="border-t border-slate-900 w-full"></div>
<div class="border-t border-slate-900 w-full"></div>
<div class="border-t border-slate-900 w-full"></div>
<div class="border-t border-slate-900 w-full"></div>
<div class="border-t border-slate-900 w-full"></div>
</div>
<div class="h-full w-full flex items-end justify-between relative overflow-hidden">
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 400 200">
<path d="M0 180 Q 50 150, 100 160 T 200 80 T 300 110 T 400 40 L 400 200 L 0 200 Z" fill="rgba(179, 32, 6, 0.15)"></path>
<path d="M0 180 Q 50 150, 100 160 T 200 80 T 300 110 T 400 40" fill="none" stroke="#b32006" stroke-width="3"></path>
<circle cx="200" cy="80" fill="#b32006" r="4"></circle>
</svg>
<div class="absolute top-2 right-4 flex items-center gap-2">
<span class="w-3 h-3 bg-primary rounded-full"></span>
<span class="font-mono text-[10px] text-on-surface-variant">Real-time Flux</span>
</div>
</div>
</div>
</div>
</div>
<!-- Footer / Metadata -->
<footer class="mt-12 flex justify-between items-center text-[10px] text-slate-400 font-mono border-t border-surface-container pt-4">
<span>FORGE ANALYTICS PROPRIETARY</span>
<span>SLIDE 04 / 12</span>
<span>CONFIDENTIAL</span>
</footer>
</div>
</div>
<!-- Hidden Drawer Trigger (New) -->
<button class="fixed right-0 top-1/2 -translate-y-1/2 bg-surface-container-high hover:bg-surface-container-highest border-l border-y border-outline/20 px-1 py-12 rounded-l-md transition-colors z-50 group">
<span class="material-symbols-outlined text-secondary group-hover:text-primary transition-colors" style="font-size: 20px;">chevron_left</span>
</button>
<!-- Persistent Navigation Bar (Updated) -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-full flex items-center gap-6 shadow-xl border border-white/40 ring-1 ring-black/5 z-50">
<button class="flex items-center justify-center w-8 h-8 rounded-full text-secondary hover:text-primary transition-colors hover:bg-primary/5">
<span class="material-symbols-outlined text-lg" data-icon="chevron_left">chevron_left</span>
</button>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 px-2">
<div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
<div class="w-3 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
</div>
<div class="w-px h-6 bg-slate-200"></div>
<span class="font-mono text-[11px] font-bold text-on-surface-variant tracking-tight whitespace-nowrap">SLIDE 04 / 12</span>
</div>
<button class="flex items-center justify-center w-8 h-8 rounded-full text-secondary hover:text-primary transition-colors hover:bg-primary/5">
<span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Aesthetic Decoration -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-40">
<div class="absolute top-0 right-0 w-[50vw] h-[50vw] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-0 left-0 w-[40vw] h-[40vw] bg-secondary-container/20 blur-[100px] rounded-full"></div>
</div>
</main>
</body></html>
