name: CI (nx affected + docs-only planning)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes (docs-only guard)
    runs-on: ubuntu-latest

    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      changed_files: ${{ steps.changed-files.outputs.all_changed_files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          since_last_remote_commit: true

      - name: Decide docs-only
        id: detect
        run: |
          echo "Changed files:"
          printf '%s\n' "${{ steps.changed-files.outputs.all_changed_files }}"

          docs_only=true
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ ! "$file" =~ ^_docs/ ]] && [[ ! "$file" =~ \.md$ ]]; then
              docs_only=false
              break
            fi
          done

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "Docs-only decision: $docs_only"

      - name: Summarize CI scope decision
        if: always()
        run: |
          echo "## CI scope decision" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docs-only: ${{ steps.detect.outputs.docs_only }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Changed files:" >> "$GITHUB_STEP_SUMMARY"
          printf '  - %s\n' ${{ steps.changed-files.outputs.all_changed_files }} >> "$GITHUB_STEP_SUMMARY"

  build-and-test:
    name: CI (nx affected)
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (nx affected)
        run: pnpm exec nx affected -t lint --base=origin/main --head=HEAD

      - name: Test (nx affected)
        run: pnpm exec nx affected -t test --base=origin/main --head=HEAD

      - name: Build (nx affected)
        run: pnpm exec nx affected -t build --base=origin/main --head=HEAD

  storybook-pages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook (frontend)
        run: pnpm exec nx run frontend:build-storybook

      - name: Build Storybook (material-ui)
        run: pnpm exec nx run material-ui:build-storybook

      - name: Merge Storybook artifacts
        run: |
          mkdir -p storybook-static/material-ui
          cp -r apps/frontend/storybook-static/* storybook-static/
          cp -r libs/material-ui/storybook-static/* storybook-static/material-ui/

      - id: artifact-name
        name: Set unique artifact name
        run: echo "ARTIFACT_SUFFIX=${{ github.run_id }}-${{ github.run_attempt }}-$(date +%s%N | cut -b1-13)" >> $GITHUB_ENV

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static
          name: github-pages-${{ env.ARTIFACT_SUFFIX }}

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ env.ARTIFACT_SUFFIX }}

