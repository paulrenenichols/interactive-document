# Development Compose - self-contained, with hot reload, Adminer, and seed data.
# Usage: docker compose -f docker-compose.dev.yml up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: interactive_document
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d interactive_document"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: dev/migrations/Dockerfile
    environment:
      DATABASE_URL: postgres://app:app@db:5432/interactive_document
      RUN_SEED: "true"
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "scripts/run-migrations.mjs"]
    restart: "no"

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

  api:
    build:
      context: .
      dockerfile: dev/Dockerfile
    volumes:
      - ./apps/api/src:/app/apps/api/src:cached
      - ./apps/api/migrations:/app/apps/api/migrations:cached
      - ./scripts:/app/scripts:cached
    environment:
      DATABASE_URL: postgres://app:app@db:5432/interactive_document
      JWT_SECRET: ${JWT_SECRET:-dev-secret-at-least-32-characters-long}
      PORT: "3000"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      NODE_ENV: development
    depends_on:
      migrations:
        condition: service_completed_successfully
    ports:
      - "3001:3000"
    command: ["pnpm", "exec", "tsx", "watch", "apps/api/src/main.ts"]

  frontend:
    build:
      context: .
      dockerfile: dev/Dockerfile
    volumes:
      - ./apps/frontend/app:/app/apps/frontend/app:cached
      - ./apps/frontend/components:/app/apps/frontend/components:cached
      - ./apps/frontend/lib:/app/apps/frontend/lib:cached
      - ./apps/frontend/public:/app/apps/frontend/public:cached
      - ./apps/frontend/postcss.config.mjs:/app/apps/frontend/postcss.config.mjs:cached
      - ./libs/material-ui:/app/libs/material-ui:cached
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: ["pnpm", "exec", "next", "dev", "--hostname", "0.0.0.0"]
    working_dir: /app/apps/frontend

volumes:
  pgdata: {}
